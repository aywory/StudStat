<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учёт работ</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- ══ Themes — load ALL, active one activates via :root[data-theme] ══ -->
  <link rel="stylesheet" href="css/themes/dark_theme.css">
  <link rel="stylesheet" href="css/themes/white_theme.css">
  <link rel="stylesheet" href="css/themes/glassmorphism.css">
  <link rel="stylesheet" href="css/themes/wabi_sabi_clay.css">
  <link rel="stylesheet" href="css/themes/agate_slice.css">
  <link rel="stylesheet" href="css/themes/bioluminescent_bay.css">
  <link rel="stylesheet" href="css/themes/cracked_salt_flats.css">
  <link rel="stylesheet" href="css/themes/foggy_redwood.css">
  <link rel="stylesheet" href="css/themes/phosphor_decay.css">
  <link rel="stylesheet" href="css/themes/cave_painting.css">
  <!-- Add new themes here as <link> tags, then register in app.js EXTRA_THEMES -->

  <!-- Base styles (order matters) -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Базовый favicon (все браузеры) -->
  <link rel="icon" type="image/x-icon" href="/StudStat/favicon.ico">

  <!-- PNG для современных браузеров и высоких разрешений -->
  <link rel="icon" type="image/png" sizes="32x32" href="/StudStat/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/StudStat/favicon-16x16.png">

  <!-- Apple Touch Icon (для iOS — иконка на домашнем экране) -->
  <link rel="apple-touch-icon" sizes="180x180" href="/StudStat/apple-touch-icon.png">

  <!-- Android Chrome -->
  <link rel="manifest" href="/site.webmanifest">
</head>

<body>

  <!-- ══ File prompt — content injected by app.js ══ -->
  <div id="file-prompt" style="display:none"></div>

  <!-- ══ App shell ══ -->
  <div id="app">
    <header id="header"></header>
    <nav id="sidebar"></nav>
    <main id="main"></main>
  </div>

  <!-- ══ Toast container ══ -->
  <div id="toast-container"></div>

  <!-- ══ JS modules (order: storage → ui → views → app) ══ -->
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/view-records.js"></script>
  <script src="js/view-analytics.js"></script>
  <script src="js/view-dashboard.js"></script>
  <script src="js/app.js"></script>

</body>

</html>
