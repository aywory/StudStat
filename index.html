<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учёт работ</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Themes (load all, active one applies via :root[data-theme]) -->
  <link rel="stylesheet" href="css/themes/dark_theme.css">
  <link rel="stylesheet" href="css/themes/white_theme.css">

  <!-- Base styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- ══ File prompt (shown before a data file is connected) ══ -->
  <div id="file-prompt">
    <div style="font-size:3rem">📒</div>
    <h1>Учёт работ</h1>
    <p>Все данные хранятся локально в JSON-файле на вашем компьютере.<br>Выберите существующий файл или создайте новый.</p>
    <p id="fp-hint" style="display:none;font-size:0.8rem;color:var(--text-muted);margin-top:-0.5rem"></p>
    <div class="file-prompt-actions">
      <button class="btn btn-success btn-lg" id="fp-reopen" style="display:none"></button>
      <button class="btn btn-primary btn-lg" id="fp-open">📂 Открыть файл</button>
      <button class="btn btn-ghost btn-lg"   id="fp-create">✨ Создать новый</button>
    </div>
    <p style="margin-top:1rem;font-size:0.72rem;opacity:0.4">
      Используется File System Access API. Данные не покидают ваш компьютер.
    </p>
  </div>

  <!-- ══ App shell ══ -->
  <div id="app">
    <header id="header"></header>
    <nav    id="sidebar"></nav>
    <main   id="main"></main>
  </div>

  <!-- ══ Toast container ══ -->
  <div id="toast-container"></div>

  <!-- ══ JS modules ══ -->
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/view-records.js"></script>
  <script src="js/view-analytics.js"></script>
  <script src="js/view-dashboard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
